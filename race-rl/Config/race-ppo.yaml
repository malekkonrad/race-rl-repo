behaviors:
  Racist:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 2.1e7
    time_horizon: 64
    summary_freq: 5000

environment_parameters:
  track_index:
    curriculum:
      - name: level0_straight
        value: 0
        completion_criteria:
          measure: reward
          behavior: Racist
          signal_smoothing: 150
          min_lesson_length: 10
          threshold: 5
      - name: level1_easy_loop_left
        value: 1
        completion_criteria:
          measure: reward
          behavior: Racist
          signal_smoothing: 200
          min_lesson_length: 30
          threshold: 9
      - name: level2_easy_loop_right
        value: 2
        completion_criteria:
          measure: reward
          behavior: Racist
          signal_smoothing: 200
          min_lesson_length: 30
          threshold: 12
      - name: level3_mixed_medium
        value: 3
        completion_criteria:
          measure: reward
          behavior: Racist
          signal_smoothing: 200
          min_lesson_length: 100
          threshold: 60
      - name: level4_mixed_hard
        value: 4
        completion_criteria:
          measure: reward
          behavior: Racist
          signal_smoothing: 200
          min_lesson_length: 10
          threshold: 60